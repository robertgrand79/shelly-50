<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Shelly's Golden Glam 50th — RSVP</title>
    <meta name="description" content="Join us June 9–15, 2026 in Bend & Sunriver, Oregon to celebrate Shelly's 50th. RSVP, send a video message, and share photos through the years." />
    <meta name="theme-color" content="#0d0a08" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#faf6ed" media="(prefers-color-scheme: light)" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Shelly's Golden Glam 50th" />
    <meta property="og:description" content="Join us June 9–15, 2026 in Bend & Sunriver, Oregon to celebrate Shelly's 50th." />

    <script>
      // Apply saved theme before first paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem("shelly-theme");
          var theme = saved === "light" || saved === "dark" ? saved : "dark";
          if (theme === "light") document.documentElement.setAttribute("data-theme", "light");
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
